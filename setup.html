<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตั้งค่า Admin คนแรก — Daily PPM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-bg">
  <div class="login-card">
    <div class="login-logo">🔧</div>
    <h1>ตั้งค่าครั้งแรก</h1>
    <p class="login-sub">สร้างบัญชี <b>Admin</b> คนแรก (ทำครั้งเดียว)</p>

    <form id="setupForm">
      <label>รหัสพนักงาน (Admin)</label>
      <input type="text" id="empCode" required placeholder="เช่น 00001" style="text-align:center;font-size:18px;letter-spacing:2px" />
      <label>ชื่อ-นามสกุล</label>
      <input type="text" id="empName" placeholder="ชื่อผู้ดูแลระบบ" />
      <button type="submit" class="btn btn-primary btn-block" id="goBtn">สร้างบัญชี Admin</button>
    </form>

    <p class="login-switch">เมื่อสร้างเสร็จแล้ว ให้กลับไปที่ <a href="index.html">หน้าเข้าสู่ระบบ</a> และลบไฟล์ setup.html เพื่อความปลอดภัย</p>
    <div id="msg" class="login-msg"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script>
    const msg = document.getElementById("msg");
    const show = (t, ok = false) => { msg.textContent = t; msg.className = "login-msg " + (ok ? "ok" : "err"); };

    document.getElementById("setupForm").onsubmit = async (e) => {
      e.preventDefault();
      const code = document.getElementById("empCode").value.trim();
      const name = document.getElementById("empName").value.trim() || code;
      if (!code) return show("กรุณากรอกรหัสพนักงาน");
      const btn = document.getElementById("goBtn");
      btn.disabled = true; btn.textContent = "กำลังสร้าง...";
      try {
        const r = await API.bootstrapAdmin(code, name);
        setSession(r.profile);
        show("สร้างบัญชี Admin สำเร็จ! กำลังพาเข้าระบบ...", true);
        setTimeout(() => window.location.href = "app.html", 1200);
      } catch (err) {
        btn.disabled = false; btn.textContent = "สร้างบัญชี Admin";
        show(err.message || "ไม่สำเร็จ");
      }
    };
  </script>
</body>
</html>
