<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily PPM · Air Compressor — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="assets.js"></script>
<style>
:root, [data-theme="dark"]{
  --bg:#0a0f0b; --bg2:#0e1510; --panel:#121b15;
  --card:#141d17; --card-h:#19251d; --border:#23332a; --border-soft:#1c2a22;
  --text:#e9f1ec; --muted:#8ba596; --muted2:#5f7869;
  --green:#34d27b; --green-d:#1e7e4f; --blue:#4aa3ff; --red:#ff5d5d;
  --amber:#ffb13c; --purple:#a98bff;
  --sidebar:#0c130e; --shadow:0 10px 30px rgba(0,0,0,.45);
  --grad: radial-gradient(1200px 600px at 80% -10%, rgba(52,210,123,.10), transparent 60%);
}
[data-theme="light"]{
  --bg:#eef6f0; --bg2:#f6faf6; --panel:#ffffff;
  --card:#ffffff; --card-h:#f3faf4; --border:#dfeae1; --border-soft:#e8f1ea;
  --text:#1d2a22; --muted:#5d7567; --muted2:#90a698;
  --green:#1fae63; --green-d:#1e7e4f; --blue:#2f7fe0; --red:#e0483f;
  --amber:#e7951c; --purple:#7a5be0;
  --sidebar:#ffffff; --shadow:0 8px 24px rgba(30,80,50,.10);
  --grad: radial-gradient(1100px 540px at 85% -10%, rgba(31,174,99,.14), transparent 60%),linear-gradient(180deg,#eafaf0,#f3f9f4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Prompt','Sarabun',system-ui,sans-serif;background:var(--bg);background-image:var(--grad);background-attachment:fixed;color:var(--text);min-height:100vh;}
button,input,select,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:34px 28px;box-shadow:var(--shadow);text-align:center}
.login-title{font-size:22px;font-weight:700;letter-spacing:1px}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:22px}
.fld-label{display:block;text-align:left;font-size:12px;color:var(--muted);margin-bottom:6px}
.input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;outline:none;transition:.15s}
.input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(52,210,123,.15)}
.btn{border:none;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--green);color:#06210f}
.btn-primary:hover{filter:brightness(1.07)}
.btn-block{width:100%;margin-top:16px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--card-h)}
.btn-danger{background:var(--red);color:#fff}
.btn-amber{background:var(--amber);color:#3a2400}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
.login-err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}
.login-hint{color:var(--muted2);font-size:11px;margin-top:18px;line-height:1.6}
.theme-mini{margin-top:14px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer}
.conn-status{margin-top:14px;font-size:11.5px;padding:7px 10px;border-radius:8px;line-height:1.4}
.conn-status.on{background:rgba(52,210,123,.14);color:var(--green)}
.conn-status.off{background:rgba(255,177,60,.16);color:var(--amber)}

.shell{display:flex;min-height:100vh}
.sidebar{width:248px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{display:flex;gap:10px;align-items:center;padding:18px 18px 14px;border-bottom:1px solid var(--border-soft)}
.side-brand .bt{font-weight:700;font-size:14px;letter-spacing:.5px}
.side-brand .bs{font-size:10px;color:var(--muted);letter-spacing:1px}
.nav{flex:1;padding:12px 10px;overflow:auto}
.nav-group{font-size:10px;color:var(--muted2);letter-spacing:1.2px;padding:14px 12px 6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--muted);font-size:14px;font-weight:500;transition:.13s;margin-bottom:2px}
.nav-item:hover{background:var(--card-h);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(52,210,123,.18),rgba(52,210,123,.04));color:var(--green);border:1px solid rgba(52,210,123,.25)}
.nav-item .ic{font-size:16px;width:20px;text-align:center}
.side-foot{padding:12px;border-top:1px solid var(--border-soft)}
.user-chip{display:flex;gap:10px;align-items:center;padding:8px;border-radius:10px;background:var(--card);margin-bottom:8px}
.avatar{width:36px;height:36px;border-radius:10px;background:var(--green-d);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.user-meta .un{font-size:13px;font-weight:600} .user-meta .ur{font-size:11px;color:var(--muted);text-transform:capitalize}
.side-btn{width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px}
.side-btn:hover{background:var(--card-h);color:var(--text)}
.side-btn.danger:hover{color:var(--red)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:20px 26px;border-bottom:1px solid var(--border-soft)}
.page-title{font-size:24px;font-weight:700}
.page-sub{color:var(--muted);font-size:13px;margin-top:2px}
.top-actions{display:flex;align-items:center;gap:14px}
.filter-pills{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bell{position:relative;background:var(--card);border:1px solid var(--border);width:42px;height:42px;border-radius:12px;font-size:18px;cursor:pointer}
.badge-dot{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.content{padding:24px 26px;flex:1}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:26px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 18px 16px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--green)}
.kpi.b::before{background:var(--blue)} .kpi.r::before{background:var(--red)}
.kpi.a::before{background:var(--amber)} .kpi.p::before{background:var(--purple)}
.kpi .label{font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.kpi .num{font-size:38px;font-weight:700;line-height:1.1;margin-top:6px}
.kpi .num small{font-size:15px;color:var(--muted);font-weight:500}
.kpi .foot{font-size:12px;color:var(--muted);margin-top:8px}

.section-title{font-size:14px;color:var(--muted);margin:8px 0 14px;letter-spacing:.5px}

.mc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;transition:.15s;position:relative}
.mc:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow)}
.mc .mc-top{display:flex;justify-content:space-between;align-items:flex-start}
.mc .mc-name{font-size:16px;font-weight:700}
.mc .mc-loc{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block}
.dot.ok{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.none{background:var(--muted2)} .dot.pend{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.dot.ng{background:var(--red);box-shadow:0 0 8px var(--red)}
.mc .mc-status{font-size:12.5px;margin-top:14px;font-weight:600}
.mc .pbar{height:5px;background:var(--border);border-radius:4px;margin-top:12px;overflow:hidden}
.mc .pbar > i{display:block;height:100%;background:var(--green);border-radius:4px}
.mc .mc-hour,.mc .mc-pm{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 10px;border-radius:10px;background:var(--bg2);border:1px solid var(--border-soft)}
.mc .mc-hour .mh-ic,.mc .mc-pm .mh-ic{font-size:15px}
.mc .mc-hour .mh-label,.mc .mc-pm .mh-label{font-size:11px;color:var(--muted);flex:1}
.mc .mc-hour .mh-val{font-size:15px;font-weight:700;color:var(--green)}
.mc .mc-pm .mh-val{font-size:14px;font-weight:700;color:var(--green)}
.mc .mc-pm.warn{border-color:var(--amber)} .mc .mc-pm.warn .mh-val{color:var(--amber)}
.mc .mc-pm.due{border-color:var(--red);background:rgba(255,93,93,.08)} .mc .mc-pm.due .mh-val{color:var(--red)}

.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.panel-head{padding:16px 18px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.panel-head h3{font-size:15px}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;color:var(--muted);font-weight:600;padding:11px 14px;border-bottom:1px solid var(--border-soft);font-size:11.5px;letter-spacing:.5px;text-transform:uppercase}
table.tbl td{padding:11px 14px;border-bottom:1px solid var(--border-soft)}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr:hover td{background:var(--card-h)}
.tbl.rpt th,.tbl.rpt td{text-align:center;white-space:nowrap;font-size:12px}
.tbl td.cell-ng{background:rgba(255,93,93,.18);color:var(--red);font-weight:600}
.tbl td.cell-ok{background:rgba(52,210,123,.12)}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.chip.ok{background:rgba(52,210,123,.16);color:var(--green)}
.chip.ng{background:rgba(255,93,93,.16);color:var(--red)}
.chip.sub{background:rgba(255,177,60,.16);color:var(--amber)}
.chip.appr{background:rgba(74,163,255,.16);color:var(--blue)}
.chip.rej{background:rgba(255,93,93,.16);color:var(--red)}
.chip.draft{background:var(--card-h);color:var(--muted)}

.select,.date-input{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.seg button{background:none;border:none;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--muted)}
.seg button.on{background:var(--green);color:#06210f;font-weight:600}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px}
textarea.input{resize:vertical;min-height:70px}
.row-actions{display:flex;gap:10px;flex-wrap:wrap}
.login-id-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px}
.login-id-box .lid-role{display:inline-block;margin-left:8px;font-size:11px;padding:2px 8px;border-radius:8px;background:rgba(52,210,123,.16);color:var(--green);text-transform:capitalize}
.floor{position:relative;width:100%;aspect-ratio:1532/688;max-height:82vh;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:4px auto;background:#fff center/100% 100% no-repeat}
.fm.mini{width:80px;padding:6px 5px}
.fm.mini .fm-name{font-size:10px;margin-top:2px}
.fm.mini .fm-id{font-size:9px}
.fm.mini svg,.fm.mini img{width:30px!important;height:30px!important}
.hamb{display:none;background:var(--card);border:1px solid var(--border);width:42px;height:42px;border-radius:12px;font-size:18px;cursor:pointer;align-items:center;justify-content:center}
@media(max-width:860px){
  .hamb{display:inline-flex}
  .page-title{font-size:19px} .content{padding:16px 13px} .topbar{padding:13px 14px;flex-direction:row;align-items:center}
  .kpi .num{font-size:28px} .kpi-grid{gap:11px}
  .fm{width:96px;padding:7px 5px} .fm .fm-name{font-size:11px} .fmd{width:130px;padding:9px}
  .drawer{width:300px}
}
.floor-hint{position:absolute;left:12px;top:10px;font-size:11px;color:var(--muted2);background:var(--panel);padding:3px 8px;border-radius:8px;border:1px solid var(--border-soft);z-index:2}
.fm{position:absolute;transform:translate(-50%,-50%);background:var(--card);border:2px solid var(--border);border-radius:12px;padding:7px;line-height:0;cursor:pointer;transition:.12s;box-shadow:0 3px 10px rgba(0,0,0,.22)}
.fm:hover{border-color:var(--green);box-shadow:0 6px 16px rgba(0,0,0,.3);transform:translate(-50%,-50%) scale(1.1);z-index:4}
.fm.off{opacity:.55;cursor:not-allowed}
.fm.off:hover{border-color:var(--red);transform:translate(-50%,-50%)}
.fm svg,.fm img{width:var(--fm-ic,42px)!important;height:var(--fm-ic,42px)!important;object-fit:contain;display:block}
.fm .fm-dot{position:absolute;top:-5px;right:-5px;width:13px;height:13px;border-radius:50%;border:2px solid var(--card)}
.fm .fm-dot.on{background:var(--green);box-shadow:0 0 7px var(--green)}
.fm .fm-dot.off{background:var(--muted2)}
.dcard{position:relative;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:.15s}
.dcard:hover{border-color:var(--green);box-shadow:var(--shadow);transform:translateY(-2px)}
.dcard.checked{background:rgba(52,210,123,.10);border-color:rgba(52,210,123,.4)}
.dcard.todo{background:rgba(255,93,93,.10);border-color:rgba(255,93,93,.4)}
.dcard.inactive{opacity:.6}
.dcard .fmd-dot{position:absolute;top:12px;right:12px;width:14px;height:14px;border-radius:50%;border:2px solid var(--card)}
.dcard .fmd-dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.dcard .fmd-dot.off{background:var(--muted2)}
.dcard .dc-head{display:flex;align-items:center;gap:11px;margin-bottom:8px}
.dcard .dc-head svg,.dcard .dc-head img{width:42px;height:42px;object-fit:contain;flex-shrink:0}
.dcard .fmd-name{font-size:14px;font-weight:700;line-height:1.2}
.dcard .fmd-id{font-size:10px;color:var(--muted);letter-spacing:.5px}
.dcard .fmd-row{display:flex;gap:6px;font-size:12px;margin-top:6px}
.dcard .fmd-row .lbl{color:var(--muted);flex:1}
.dcard .fmd-row .val{font-weight:700}
.dcard .pmv.warn{color:var(--amber)} .dcard .pmv.due{color:var(--red)} .dcard .pmv.okc{color:var(--green)}
.fmd{position:absolute;transform:translate(-50%,-50%);width:160px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 12px 10px;cursor:pointer;transition:.15s}
.fmd:hover{border-color:var(--green);box-shadow:var(--shadow);transform:translate(-50%,-50%) scale(1.04);z-index:3}
.fmd.checked{background:rgba(52,210,123,.12);border-color:rgba(52,210,123,.45)}
.fmd.todo{background:rgba(255,93,93,.12);border-color:rgba(255,93,93,.45)}
.fmd.inactive{opacity:.6}
.fmd .fmd-dot{position:absolute;top:10px;right:10px;width:14px;height:14px;border-radius:50%;border:2px solid var(--card)}
.fmd .fmd-dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.fmd .fmd-dot.off{background:var(--muted2)}
.fmd .fmd-name{font-size:13px;font-weight:700;padding-right:18px;line-height:1.2}
.fmd .fmd-id{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px}
.fmd .fmd-row{display:flex;align-items:center;gap:6px;font-size:11px;margin-top:5px}
.fmd .fmd-row .lbl{color:var(--muted);flex:1;white-space:nowrap}
.fmd .fmd-row .val{font-weight:700}
.fmd .pmv.warn{color:var(--amber)} .fmd .pmv.due{color:var(--red)} .fmd .pmv.okc{color:var(--green)}
#loadingView{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  background:radial-gradient(900px 500px at 50% 30%,rgba(31,174,99,.14),transparent 60%),var(--bg)}
#loadingView img{width:124px;height:124px;object-fit:contain;border-radius:20px;box-shadow:var(--shadow);animation:ldpop .5s ease}
@keyframes ldpop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
#loadingView .ld-title{font-size:21px;font-weight:800;letter-spacing:1px}
#loadingView .ld-title .o{color:#ef6b2a} #loadingView .ld-title .g{color:#1ea34a} #loadingView .ld-title .b{color:#2f5fe0}
#loadingView .ld-sub{font-size:12px;color:var(--muted);margin-top:-8px}
#loadingView .ld-bar{width:210px;height:6px;border-radius:6px;background:var(--border);overflow:hidden}
#loadingView .ld-bar>i{display:block;height:100%;width:40%;border-radius:6px;background:linear-gradient(90deg,#1ea34a,#ef6b2a);animation:ldslide 1.1s infinite}
@keyframes ldslide{0%{margin-left:-42%}100%{margin-left:102%}}

.check-item{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--border);border-radius:12px;margin-bottom:10px;background:var(--card)}
.check-item .ci-label{flex:1;font-size:14px;font-weight:500}
.check-item .ci-ctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.seg.choice button.on{background:var(--green);color:#06210f;font-weight:600}
.seg.choice button.on.bad{background:var(--red);color:#fff}
.check-item input[type=number]{width:120px}
.range-hint{font-size:11px;color:var(--muted2);margin-left:6px}
.res-pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:8px;min-width:34px;text-align:center}
.res-pill.pass{background:rgba(52,210,123,.16);color:var(--green)}
.res-pill.fail{background:rgba(255,93,93,.16);color:var(--red)}
.res-pill.na{background:var(--card-h);color:var(--muted)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
.drawer{position:fixed;top:0;right:0;width:360px;max-width:90vw;height:100vh;background:var(--panel);border-left:1px solid var(--border);z-index:50;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.drawer-head{padding:16px 18px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;font-weight:600}
.mini-link{background:none;border:none;color:var(--green);cursor:pointer;font-size:12.5px;margin-left:10px}
.notif-list{flex:1;overflow:auto;padding:10px}
.notif{padding:12px 14px;border:1px solid var(--border-soft);border-radius:12px;margin-bottom:8px;cursor:pointer}
.notif.unread{border-left:3px solid var(--green);background:var(--card-h)}
.notif .nt{font-size:13px}
.notif .ntype{font-size:10px;padding:1px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.ntype.alert{background:rgba(255,93,93,.16);color:var(--red)}
.ntype.review{background:rgba(255,177,60,.16);color:var(--amber)}
.ntype.approved{background:rgba(74,163,255,.16);color:var(--blue)}
.ntype.rejected{background:rgba(255,93,93,.16);color:var(--red)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:18px;width:100%;max-width:640px;max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center}
.modal-head h3{font-size:17px}
.modal-body{padding:22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border-soft);display:flex;justify-content:flex-end;gap:10px}
.x-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--panel);border:1px solid var(--border);padding:13px 22px;border-radius:12px;box-shadow:var(--shadow);z-index:80;transition:.25s;font-size:14px;font-weight:500}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green)} .toast.err{border-color:var(--red)}
.empty{text-align:center;color:var(--muted);padding:50px 20px}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.muted{color:var(--muted)} .right{text-align:right}
.flex{display:flex;gap:10px;align-items:center} .wrap{flex-wrap:wrap}
.mt{margin-top:14px}.mb{margin-bottom:14px}

@media(max-width:860px){
  .sidebar{position:fixed;left:-260px;z-index:70;transition:.2s}
  .sidebar.open{left:0}
  .form-grid,.grid-2{grid-template-columns:1fr}
  .topbar{flex-direction:column}
}

<script>
'use strict';
/* ============================================================
 * BACKEND_URL: วาง URL ของ Apps Script Web App (ลงท้าย /exec) ที่นี่
 * เพื่อให้ทุกอุปกรณ์ดึง/บันทึกข้อมูลชุดเดียวกันจาก Google Sheet
 * เว้นว่าง = โหมดเดโม่ (ข้อมูลจำลองในเครื่อง ไม่บันทึกจริง)
 * ตัวอย่าง: var BACKEND_URL='https://script.google.com/macros/s/AKfycb..../exec';
 * ============================================================ */
var BACKEND_URL='https://script.google.com/macros/s/AKfycbwi1jxkv8znasi4rzlK81xnUXhSXbFYF7rUD7oOGHO_25lYj0FOm_Sgd3KYYBFlxbfFhQ/exec';
try{ if(!BACKEND_URL){ var _b=localStorage.getItem('ppm_backend'); if(_b) BACKEND_URL=_b; } }catch(e){}
var S={user:null,machines:[],items:[],date:todayStr(),shift:'all',notifs:[],view:'dashboard'};
function todayStr(){var d=new Date(),p=function(n){return (n<10?'0':'')+n;};return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function $(s,el){return (el||document).querySelector(s);}
function $all(s,el){return Array.prototype.slice.call((el||document).querySelectorAll(s));}
function el(html){var t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);S.theme=t;}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
$('#loginThemeBtn').onclick=toggleTheme;
var toastT;
function toast(msg,type){var t=$('#toast');t.textContent=msg;t.className='toast show '+(type||'');clearTimeout(toastT);toastT=setTimeout(function(){t.className='toast '+(type||'');},2600);}

function doLogin(){
  var id=$('#empInput').value.trim();var err=$('#loginErr');err.textContent='';
  if(!id){err.textContent='กรุณากรอกรหัสพนักงาน';return;}
  var btn=$('#loginBtn');btn.disabled=true;btn.textContent='กำลังเข้าสู่ระบบ...';
  gs('apiLogin',id).then(function(r){
    btn.disabled=false;btn.textContent='เข้าสู่ระบบ';
    if(!r.ok){err.textContent=r.error;return;}
    S.user=r.user;
    return gs('apiBootstrap',id).then(function(b){
      S.machines=b.machines;S.items=b.items;S.notifs=b.notifications;S.date=b.today;S.floorPlan=b.floorPlan||'floorplan.png';S.iconSize=b.iconSize||42;applyIconSize(S.iconSize);
      $('#loginView').style.display='none';
      var lv=$('#loadingView');lv.style.display='flex';
      setTimeout(function(){lv.style.display='none';startApp();},1500);
    });
  }).catch(function(e){btn.disabled=false;btn.textContent='เข้าสู่ระบบ';err.textContent='เกิดข้อผิดพลาด: '+e.message;});
}
$('#loginBtn').onclick=doLogin;
$('#empInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

var NAV={
  dashboard:{label:'Dashboard',ic:'📊',roles:['operator','engineer','admin','viewer'],group:'ภาพรวม'},
  dailycheck:{label:'Daily Check',ic:'📝',roles:['operator','admin'],group:'การผลิต'},
  approvals:{label:'อนุมัติงาน',ic:'✅',roles:['engineer','admin'],group:'การผลิต'},
  records:{label:'ประวัติการตรวจ',ic:'📁',roles:['operator','engineer','admin','viewer'],group:'การผลิต'},
  report:{label:'รายงานรายเดือน',ic:'📑',roles:['engineer','admin','viewer'],group:'การผลิต'},
  admin:{label:'Admin · ตั้งค่า',ic:'⚙️',roles:['admin'],group:'ระบบ'},
  audit:{label:'Audit Log',ic:'🔎',roles:['engineer','admin'],group:'ระบบ'}
};
function buildNav(){
  var nav=$('#navMenu');nav.innerHTML='';var groups={};
  Object.keys(NAV).forEach(function(k){if(NAV[k].roles.indexOf(S.user.role)===-1)return;var g=NAV[k].group;(groups[g]=groups[g]||[]).push(k);});
  Object.keys(groups).forEach(function(g){nav.appendChild(el('<div class="nav-group">'+g+'</div>'));groups[g].forEach(function(k){var item=el('<div class="nav-item" data-view="'+k+'"><span class="ic">'+NAV[k].ic+'</span>'+NAV[k].label+'</div>');item.onclick=function(){if(k==='dailycheck')dcMachineId=null;go(k);};nav.appendChild(item);});});
}
function go(view){
  S.view=view;$all('.nav-item').forEach(function(n){n.classList.toggle('active',n.dataset.view===view);});
  if(window.innerWidth<=860) $('.sidebar').classList.remove('open');
  var R={dashboard:viewDashboard,dailycheck:viewDailyCheck,approvals:viewApprovals,records:viewRecords,report:viewReport,admin:viewAdmin,audit:viewAudit};
  (R[view]||viewDashboard)();
}
function startApp(){
  $('#loginView').style.display='none';$('#appShell').style.display='flex';
  $('#userName').textContent=S.user.name;$('#userRole').textContent=S.user.role;
  $('#userAvatar').textContent=(S.user.name||'U').charAt(0).toUpperCase();
  buildNav();renderNotifBadge();go('dashboard');
}
function topFilterBar(onChange){var bar=$('#topFilters');bar.innerHTML='';var date=el('<input type="date" class="date-input" value="'+S.date+'">');date.onchange=function(){S.date=date.value;onChange&&onChange();};bar.appendChild(date);}
function clearTopFilters(){$('#topFilters').innerHTML='';}
function setPage(title,sub){$('#pageTitle').textContent=title;$('#pageSub').textContent=sub||'';}
var _silent=false;
function loading(){if(_silent)return;$('#content').innerHTML='<div class="spinner"></div>';}

function viewDashboard(){
  setPage('Machine Overview','Daily PPM · Air Compressor');topFilterBar(viewDashboard);loading();
  Promise.all([gs('apiDashboard',S.user.employeeId,S.date,S.shift),gs('apiTodayStatus',S.user.employeeId,S.date,S.shift)]).then(function(r){
    var d=r[0],st=r[1];
    var kpis=
      kpiCard('','เครื่องจักรทั้งหมด',d.totalMachines,'เครื่อง','ตรวจแล้ว '+d.checkedMachines+'/'+d.totalMachines)+
      kpiCard('b','ตรวจวันนี้',d.submitted,'รายการ','ความครบถ้วน '+d.completionPct+'%')+
      kpiCard('a','รออนุมัติ',d.pending,'รายการ','Pending review')+
      kpiCard('','อนุมัติแล้ว',d.approved,'รายการ','Approved')+
      kpiCard('r','พบผิดปกติ (NG)',d.ng,'รายการ',d.ng>0?'⚠ ต้องตรวจสอบ':'ปกติทั้งหมด')+
      kpiCard('p','PM ใหญ่ถึงกำหนด',d.pmDue,'เครื่อง',d.pmDue>0?'⚠ ต้องวางแผนซ่อม':'ยังไม่ถึงกำหนด');
    var cards=st.map(dashCard).join('');
    $('#content').innerHTML='<div class="kpi-grid">'+kpis+'</div><div class="section-title">สถานะเครื่องจักร · '+esc(S.date)+' &nbsp;<span class="muted" style="font-size:11px">🟢 เปิด · ⚪ ปิด · พื้นแดง=ยังไม่ตรวจ · พื้นเขียว=ตรวจแล้ว</span></div>'+
      '<div class="mc-grid">'+(cards||'<div class="empty">ไม่มีเครื่องจักร</div>')+'</div>';
    $all('.dcard').forEach(function(c){c.onclick=function(){
      var rid=c.dataset.rid;
      if(rid){openRecordModal(rid);return;}
      if(c.dataset.active!=='1'){toast('เครื่องนี้ปิดใช้งาน','err');return;}
      if(NAV.dailycheck.roles.indexOf(S.user.role)>-1){dcMachineId=c.dataset.mid;go('dailycheck');}
      else toast('ยังไม่มีการตรวจสำหรับเครื่องนี้');
    };});
  }).catch(showErr);
}
function kpiCard(cls,label,num,unit,foot){return '<div class="kpi '+cls+'"><div class="label">'+esc(label)+'</div><div class="num">'+num+' <small>'+esc(unit)+'</small></div><div class="foot">'+esc(foot)+'</div></div>';}
function pmBlock(m){
  if(!m.pmInterval||m.pmInterval<=0)
    return '<div class="mc-pm"><span class="mh-ic">🛠</span><span class="mh-label">PM ใหญ่</span><span class="mh-val" style="color:var(--muted)">ยังไม่ตั้งค่า</span></div>';
  if(m.pmRemaining==null)
    return '<div class="mc-pm"><span class="mh-ic">🛠</span><span class="mh-label">PM ใหญ่ทุก '+m.pmInterval+' ชม.</span><span class="mh-val" style="color:var(--muted)">รอข้อมูลชม.</span></div>';
  var rem=m.pmRemaining,warn=m.pmInterval*0.1,cls,label,val;
  if(rem<=0){cls='due';label='ถึงกำหนด PM ใหญ่';val='เกิน '+Math.abs(rem)+' ชม.';}
  else if(rem<=warn){cls='warn';label='ใกล้ครบ PM ใหญ่';val=rem+' ชม.';}
  else{cls='';label='PM ใหญ่รอบหน้าอีก';val=rem+' ชม.';}
  return '<div class="mc-pm '+cls+'"><span class="mh-ic">🛠</span><span class="mh-label">'+label+'</span><span class="mh-val">'+val+'</span></div>';
}
function dashMachine(m){
  var active=m.active!==false;
  var checked=active && m.status && m.status!=='None';
  var cls=active?(checked?'checked':'todo'):'inactive';
  var rh=(m.runHour!==''&&m.runHour!=null)?esc(m.runHour)+' hr':'-';
  var pmTxt='ยังไม่ตั้ง',pmCls='';
  if(m.pmInterval&&m.pmInterval>0){
    if(m.pmRemaining==null){pmTxt='รอข้อมูล';}
    else if(m.pmRemaining<=0){pmCls='due';pmTxt='เกิน '+Math.abs(m.pmRemaining)+' ชม.';}
    else if(m.pmRemaining<=m.pmInterval*0.1){pmCls='warn';pmTxt=m.pmRemaining+' ชม.';}
    else {pmCls='okc';pmTxt=m.pmRemaining+' ชม.';}
  }
  var x=(m.layoutX!=null&&m.layoutX!=='')?m.layoutX:50, y=(m.layoutY!=null&&m.layoutY!=='')?m.layoutY:50;
  return '<div class="fmd '+cls+'" data-rid="'+esc(m.recordId||'')+'" data-mid="'+esc(m.machineId)+'" data-active="'+(active?1:0)+'" style="left:'+x+'%;top:'+y+'%">'+
    '<span class="fmd-dot '+(active?'on':'off')+'"></span>'+
    '<div class="fmd-name">'+esc(m.machineName)+'</div><div class="fmd-id">'+esc(m.machineId)+'</div>'+
    '<div class="fmd-row"><span class="lbl">⏱ ชม.ทำงาน</span><span class="val">'+rh+'</span></div>'+
    '<div class="fmd-row"><span class="lbl">🛠 PM อีก</span><span class="val pmv '+pmCls+'">'+pmTxt+'</span></div>'+
  '</div>';
}
function dashCard(m){
  var active=m.active!==false;
  var checked=active && m.status && m.status!=='None';
  var cls=active?(checked?'checked':'todo'):'inactive';
  var rh=(m.runHour!==''&&m.runHour!=null)?esc(m.runHour)+' hr':'-';
  var pmTxt='ยังไม่ตั้ง',pmCls='';
  if(m.pmInterval&&m.pmInterval>0){
    if(m.pmRemaining==null){pmTxt='รอข้อมูล';}
    else if(m.pmRemaining<=0){pmCls='due';pmTxt='เกิน '+Math.abs(m.pmRemaining)+' ชม.';}
    else if(m.pmRemaining<=m.pmInterval*0.1){pmCls='warn';pmTxt=m.pmRemaining+' ชม.';}
    else {pmCls='okc';pmTxt=m.pmRemaining+' ชม.';}
  }
  var img=m.image?'<img src="'+esc(m.image)+'">':machineIcon();
  return '<div class="dcard '+cls+'" data-rid="'+esc(m.recordId||'')+'" data-mid="'+esc(m.machineId)+'" data-active="'+(active?1:0)+'">'+
    '<span class="fmd-dot '+(active?'on':'off')+'"></span>'+
    '<div class="dc-head">'+img+'<div><div class="fmd-name">'+esc(m.machineName)+'</div><div class="fmd-id">'+esc(m.machineId)+'</div></div></div>'+
    '<div class="fmd-row"><span class="lbl">⏱ ชม.ทำงาน</span><span class="val">'+rh+'</span></div>'+
    '<div class="fmd-row"><span class="lbl">🛠 PM อีก</span><span class="val pmv '+pmCls+'">'+pmTxt+'</span></div>'+
  '</div>';
}
function machineCard(m){
  var dotClass='none',txt='ยังไม่ตรวจ';
  if(m.status==='Approved'){dotClass='ok';txt='✓ อนุมัติแล้ว';}
  else if(m.status==='Submitted'){dotClass=(m.overall==='NG')?'ng':'pend';txt='⏳ รออนุมัติ ('+m.overall+')';}
  else if(m.status==='Rejected'){dotClass='ng';txt='✗ ตีกลับ';}
  if(m.overall==='NG'&&m.status==='Approved'){dotClass='ng';}
  var pct=(m.status==='Approved')?100:(m.status==='Submitted'?60:0);
  var rh=(m.runHour!==''&&m.runHour!=null)?esc(m.runHour)+' hr':'-';
  return '<div class="mc" data-rid="'+esc(m.recordId)+'" data-mid="'+esc(m.machineId)+'"><div class="mc-top"><div><div class="mc-name">'+esc(m.machineName)+'</div><div class="mc-loc">'+esc(m.machineId)+(m.location?' · '+esc(m.location):'')+'</div></div><span class="dot '+dotClass+'"></span></div><div class="mc-status">'+txt+'</div><div class="mc-hour"><span class="mh-ic">⏱</span><span class="mh-label">ชั่วโมงการทำงาน</span><span class="mh-val">'+rh+'</span></div>'+pmBlock(m)+'<div class="pbar"><i style="width:'+pct+'%;background:'+(dotClass==='ng'?'var(--red)':dotClass==='pend'?'var(--amber)':'var(--green)')+'"></i></div></div>';
}

var dcMachineId=null;
function viewDailyCheck(){ if(dcMachineId){renderDailyForm();}else{renderFactoryLayout();} }
function machineIcon(){return '<svg width="44" height="44" viewBox="0 0 64 64" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="19" width="34" height="20" rx="10"/><circle cx="47" cy="24" r="9"/><path d="M14 39l-2 12M36 39l2 12M9 51h32"/><path d="M47 15V8"/></svg>';}
function effFloor(){var fp=S.floorPlan;
  if(fp&&/^data:|^https?:/.test(fp))return fp;
  if(ASSETS&&ASSETS.floor)return ASSETS.floor;
  if(window.DEFAULT_FLOOR)return window.DEFAULT_FLOOR;
  return fp||'';}
function applyFloorStyle(){
  var url=effFloor();var st=document.getElementById('floorCss');
  if(!url){if(st)st.textContent='';return;}
  if(!st){st=document.createElement('style');st.id='floorCss';document.head.appendChild(st);}
  var u=url.replace(/'/g,'');
  var want=".floor{background-color:#fff;background-image:linear-gradient(rgba(255,255,255,.55),rgba(255,255,255,.55)),url('"+u+"');background-repeat:no-repeat;background-position:center;background-size:cover,100% 100%}";
  if(st.textContent!==want)st.textContent=want;
}
/* ตั้งพื้นหลังผังผ่าน CSS ครั้งเดียว (ไม่ฝัง data-uri ซ้ำทุก render → ลดอาการหน่วง) */
function floorBg(){applyFloorStyle();return '';}
function applyIconSize(ic){ic=Number(ic)||42;document.documentElement.style.setProperty('--fm-ic',ic+'px');document.documentElement.style.setProperty('--fm-w',Math.round(ic*2.6)+'px');}
var _dragEl=null,_dragFloor=null;
function _layMove(e){if(!_dragEl)return;var r=_dragFloor.getBoundingClientRect();var p=e.touches?e.touches[0]:e;var x=Math.max(0,Math.min(100,(p.clientX-r.left)/r.width*100));var y=Math.max(0,Math.min(100,(p.clientY-r.top)/r.height*100));_dragEl.style.left=x+'%';_dragEl.style.top=y+'%';_dragEl._x=x;_dragEl._y=y;e.preventDefault();}
function _layUp(){if(!_dragEl)return;var elx=_dragEl;_dragEl=null;elx.style.zIndex='';gs('apiSaveLayout',S.user.employeeId,elx.dataset.id,Math.round(elx._x),Math.round(elx._y)).then(function(){toast('บันทึกตำแหน่ง '+elx.dataset.id,'ok');}).catch(showErr);}
document.addEventListener('mousemove',_layMove);document.addEventListener('mouseup',_layUp);
document.addEventListener('touchmove',_layMove,{passive:false});document.addEventListener('touchend',_layUp);
function renderFactoryLayout(){
  setPage('Daily Check','แตะเครื่องจักรจากผังโรงงานเพื่อเริ่มตรวจ');clearTopFilters();loading();
  gs('apiMachineLayout',S.user.employeeId).then(function(ms){
    var markers=ms.map(function(m){
      var x=(m.layoutX!=null&&m.layoutX!=='')?m.layoutX:50, y=(m.layoutY!=null&&m.layoutY!=='')?m.layoutY:50;
      var img=m.image?'<img src="'+esc(m.image)+'">':machineIcon();
      return '<div class="fm'+(m.active?'':' off')+'" data-id="'+esc(m.id)+'" data-active="'+(m.active?1:0)+'" title="'+esc(m.name)+' ('+esc(m.id)+')'+(m.active?'':' — ปิดใช้งาน')+'" style="left:'+x+'%;top:'+y+'%">'+

      num.oninput=function(){updateRes(row,it);};ctrl.appendChild(num);

    }else if(it.type==='text'){

      inp.oninput=function(){updateRes(row,it);};ctrl.appendChild(inp);
    }else{

      if(isStatus && (it.min!=null||it.max!=null||it.unit))
        ctrl.appendChild(el('<span class="range-hint">เกณฑ์: '+(it.min!=null?it.min:'-')+' ~ '+(it.max!=null?it.max:'-')+(it.unit?' '+esc(it.unit):'')+'</span>'));
      var seg=el('<div class="seg choice"></div>');
      var bGood=el('<button data-v="1">'+L[0]+'</button>');var bBad=el('<button data-v="0">'+L[1]+'</button>');
      function pick(b,v){$all('button',seg).forEach(function(x){x.classList.remove('on','bad');});b.classList.add('on');if(v==='0')b.classList.add('bad');row.dataset.val=v;updateRes(row,it);}
      bGood.onclick=function(){pick(bGood,'1');};bBad.onclick=function(){pick(bBad,'0');};

function readRowValue(row,it){
  if(it.type==='number'||it.type==='text'){var inp=$('input',row);return inp?inp.value:'';}
  return row.dataset.val==='1'?true:(row.dataset.val==='0'?false:null);
}
function evalClient(it,value){
  if(it.type==='number'){if(value===''||value==null||isNaN(Number(value)))return 'na';var n=Number(value);if(it.min!=null&&n<it.min)return 'fail';if(it.max!=null&&n>it.max)return 'fail';return 'pass';}
  if(it.type==='text')return 'na';
  if(value===true||value==='true')return 'pass';if(value===false||value==='false')return 'fail';return 'na';
}
function updateRes(row,it){var r=evalClient(it,readRowValue(row,it));var pill=$('.res-pill',row);pill.className='res-pill '+r;pill.textContent=r==='pass'?'OK':r==='fail'?'NG':'-';}

function initSigPad(canvas){
  var ctx=canvas.getContext('2d');canvas.width=canvas.offsetWidth;canvas.height=150;
  ctx.lineWidth=2.2;ctx.lineCap='round';ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--text').trim()||'#fff';
  var drawing=false,has=false;
  function pos(e){var r=canvas.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return {x:t.clientX-r.left,y:t.clientY-r.top};}
  function start(e){drawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();}
  function move(e){if(!drawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();has=true;e.preventDefault();}
  function end(){drawing=false;}
  canvas.onmousedown=start;canvas.onmousemove=move;window.addEventListener('mouseup',end);
  canvas.ontouchstart=start;canvas.ontouchmove=move;canvas.ontouchend=end;
  canvas._has=function(){return has;};canvas._reset=function(){has=false;};
}
function clearSig(canvas){var c=canvas.getContext('2d');c.clearRect(0,0,canvas.width,canvas.height);canvas._reset();}
function getSig(canvas){
  if(!(canvas&&canvas._has&&canvas._has()))return '';
  var sw=320,sh=Math.round((canvas.height||150)*sw/(canvas.width||320));
  var t=document.createElement('canvas');t.width=sw;t.height=sh;
  var c=t.getContext('2d');c.fillStyle='#ffffff';c.fillRect(0,0,sw,sh);c.drawImage(canvas,0,0,sw,sh);
  return t.toDataURL('image/jpeg',0.6);
}

function exportPdf(recordId){

  var rec=MOCK._recordHtml(recordId);if(!rec){toast('ไม่พบบันทึก','err');return;}

/* ============================================================
 * MONTHLY REPORT (สรุปรายเดือน → PDF) — ตัวอย่างเบื้องต้น
 * ============================================================ */
function viewReport(){
  setPage('รายงานรายเดือน','สรุป Daily PPM รายเดือน (รายเครื่องจักร)');clearTopFilters();
  var mOpts=S.machines.map(function(m){return '<option value="'+esc(m.id)+'">'+esc(m.name)+' ('+esc(m.id)+')</option>';}).join('');
  var nowM=todayStr().slice(0,7);
  $('#content').innerHTML='<div class="panel"><div class="panel-head"><h3>สรุปรายเดือน → Export PDF</h3></div><div class="modal-body">'+
    '<div class="form-grid"><div class="field"><label>เครื่องจักร</label><select id="rpMc" class="select" style="width:100%">'+mOpts+'</select></div>'+
    '<div class="field"><label>เดือน</label><input id="rpMonth" type="month" class="input" value="'+nowM+'"></div></div>'+
    '<div class="row-actions"><button class="btn btn-ghost" id="rpView">ดูสรุป</button><button class="btn btn-primary" id="rpPdf">📄 Export PDF (เมทริกซ์)</button><button class="btn btn-amber" id="rpForm">📋 Export ตามฟอร์ม PPM</button></div>'+
    '<div id="rpPreview" class="mt"></div></div></div>';
  $('#rpView').onclick=loadReport;
  $('#rpPdf').onclick=exportMonthlyPdf;
  $('#rpForm').onclick=exportFormPdf;
  $('#rpMc').onchange=loadReport;$('#rpMonth').onchange=loadReport;
  loadReport();
}
function exportFormPdf(){
  if(!inGAS() && !BACKEND_URL){toast('Export ตามฟอร์ม ต้องเชื่อม Google Sheet (Apps Script) ก่อน','err');return;}
  var mid=$('#rpMc').value, month=$('#rpMonth').value;
  toast('กำลังสร้างฟอร์ม PDF...');
  gs('apiExportMonthlyForm',S.user.employeeId,mid,month).then(function(r){
    var b=atob(r.base64);var arr=new Uint8Array(b.length);for(var i=0;i<b.length;i++)arr[i]=b.charCodeAt(i);
    var blob=new Blob([arr],{type:'application/pdf'});var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=r.filename;document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1500);toast('ดาวน์โหลดฟอร์ม PDF แล้ว','ok');
  }).catch(function(e){toast('สร้างฟอร์มไม่ได้: '+(e&&e.message||e),'err');});
}
function reportData(cb){
  var mid=$('#rpMc').value, month=$('#rpMonth').value;
  $('#rpPreview').innerHTML='<div class="spinner"></div>';
  gs('apiMonthly',S.user.employeeId,mid,month).then(function(rs){
    var st={total:rs.length,ok:0,ng:0,approved:0,pending:0,rejected:0,days:{}};
    rs.forEach(function(r){if(r.overall==='OK')st.ok++;if(r.overall==='NG')st.ng++;if(r.status==='Approved')st.approved++;if(r.status==='Submitted')st.pending++;if(r.status==='Rejected')st.rejected++;st.days[r.date]=1;});
    st.daysChecked=Object.keys(st.days).length;
    var m=S.machines.find(function(x){return x.id===mid;})||{id:mid,name:mid};
    cb(m,month,rs,st);
  }).catch(showErr);
}
function reportStatChip(st){
  return '<div class="kpi-grid" style="margin-bottom:14px">'+
    kpiCard('','วันที่ตรวจ',st.daysChecked,'วัน','รวม '+st.total+' รายการ')+
    kpiCard('','ผล OK',st.ok,'รายการ','ปกติ')+
    kpiCard('r','ผล NG',st.ng,'รายการ',st.ng>0?'⚠ ผิดปกติ':'-')+
    kpiCard('b','อนุมัติแล้ว',st.approved,'รายการ','รออนุมัติ '+st.pending)+'</div>';
}
function cellVal(rec,itId){var d=(rec.data||[]).find(function(x){return x.itemId===itId;});if(!d)return {t:'-',c:''};return {t:valDisplay(d),c:d.result==='fail'?'ng':(d.result==='pass'?'ok':'')};}
function loadReport(){
  reportData(function(m,month,rs,st){
    var items=S.items;
    var head='<th>วันที่</th><th>ผู้ตรวจ</th>'+items.map(function(it){return '<th>'+esc(it.label)+(it.unit?' ('+esc(it.unit)+')':'')+'</th>';}).join('')+'<th>ผล</th>';
    var body=rs.map(function(r){
      var cells=items.map(function(it){var c=cellVal(r,it.id);return '<td class="'+(c.c==='ng'?'cell-ng':c.c==='ok'?'cell-ok':'')+'">'+esc(c.t)+'</td>';}).join('');
      return '<tr><td>'+esc(r.date)+'</td><td>'+esc(r.operatorName)+'</td>'+cells+'<td>'+resultChip(r.overall)+'</td></tr>';
    }).join('');
    var tbl=rs.length?('<div style="overflow:auto"><table class="tbl rpt"><thead><tr>'+head+'</tr></thead><tbody>'+body+'</tbody></table></div>'):'<div class="empty">ไม่มีข้อมูลในเดือนนี้</div>';
    $('#rpPreview').innerHTML='<div class="section-title">'+esc(m.name)+' ('+esc(m.id)+') · เดือน '+esc(month)+' (ถึง '+esc(todayStr())+')</div>'+reportStatChip(st)+tbl;
  });
}
function buildMonthlyReportHtml(m,month,rs,st){
  var items=S.items;
  var head='<th>วันที่</th><th>ผู้ตรวจ</th>'+items.map(function(it){return '<th>'+esc(it.label)+(it.unit?'<br>('+esc(it.unit)+')':'')+'</th>';}).join('')+'<th>ผล</th>';
  var rows=rs.map(function(r){
    var cells=items.map(function(it){var c=cellVal(r,it.id);var col=c.c==='ng'?'#c0392b':(c.c==='ok'?'#1e7e4f':'#333');return '<td style="text-align:center;color:'+col+'">'+esc(c.t)+'</td>';}).join('');
    var oc=r.overall==='NG'?'#c0392b':'#1e7e4f';
    return '<tr><td>'+esc(r.date)+'</td><td>'+esc(r.operatorName)+'</td>'+cells+'<td style="text-align:center;font-weight:bold;color:'+oc+'">'+(r.overall||'-')+'</td></tr>';
  }).join('');
  return '<html><head><meta charset="utf-8"><title>Monthly PPM '+esc(m.id)+' '+esc(month)+'</title><style>'+
    '@page{size:A4 landscape;margin:10mm}body{font-family:Arial,sans-serif;color:#222}h1{color:#1e7e4f;font-size:17px;margin:0}.sub{color:#666;font-size:11px;margin-bottom:8px}'+
    'table{width:100%;border-collapse:collapse;font-size:10px;table-layout:fixed}th{background:#1e7e4f;color:#fff;padding:4px;border:1px solid #1e7e4f;word-wrap:break-word}td{border:1px solid #bbb;padding:3px}'+
    '.sum{margin:6px 0;font-size:11px}.foot{margin-top:10px;font-size:9px;color:#999;border-top:1px dashed #ccc;padding-top:6px}</style></head><body>'+
    '<h1>THAI SUMMIT · Maintenance</h1><div class="sub">สรุป Daily PPM รายเดือน — '+esc(m.name)+' ('+esc(m.id)+') · เดือน '+esc(month)+' (ถึงวันที่ '+esc(todayStr())+')</div>'+
    '<div class="sum">วันที่ตรวจ '+st.daysChecked+' วัน · รวม '+st.total+' รายการ · OK '+st.ok+' · NG '+st.ng+' · อนุมัติ '+st.approved+' · รอ '+st.pending+' · ตีกลับ '+st.rejected+'</div>'+
    (rs.length?('<table><thead><tr>'+head+'</tr></thead><tbody>'+rows+'</tbody></table>'):'<p>ไม่มีข้อมูลในเดือนนี้</p>')+
    '<div class="foot">ออกรายงานเมื่อ '+esc(todayStr())+' · ระบบ Maintenance Daily PPM (TSAT-4) · *รูปแบบนี้เป็นตัวอย่าง จะปรับให้ตรงฟอร์ม Excel จริงเมื่อได้รับไฟล์</div></body></html>';
}
function exportMonthlyPdf(){
  reportData(function(m,month,rs,st){
    var w=window.open('','_blank');
    if(!w){toast('เบราว์เซอร์บล็อกป๊อปอัป','err');return;}
    w.document.write(buildMonthlyReportHtml(m,month,rs,st));w.document.close();
    setTimeout(function(){w.focus();w.print();},400);
    toast('เปิดหน้าพิมพ์ PDF (เลือก Save as PDF)','ok');
  });
}

    apiListItems:function(){return items.slice().sort(function(a,b){return a.order-b.order;}).map(function(i){return {id:i.id,label:i.label,type:i.type,unit:i.unit,min:i.min,max:i.max,order:i.order,active:i.active};});},

    apiListUsers:function(){return users.map(function(u){return {employeeId:u.employeeId,name:u.name,role:u.role,active:u.active};});},

    apiDeleteUser:function(id,tid){var u=findUser(id);var x=findUser(tid);if(x)x.active=false;audit_(u,'USER_DISABLE','',tid);return {ok:true};},
    apiAuditLog:function(id,limit){return audit.slice(0,limit||300);},
    _recordHtml:function(rid){return records.find(function(x){return x.recordId===rid;});}
  };

function jsonp(url){return new Promise(function(res,rej){
  var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);var s=document.createElement('script');var done=false;
  function cleanup(){try{delete window[cb];}catch(e){window[cb]=undefined;}if(s.parentNode)s.parentNode.removeChild(s);}
  window[cb]=function(d){done=true;res(d);cleanup();};
  s.onerror=function(){if(!done){cleanup();rej(new Error('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้'));}};
  s.src=url+(url.indexOf('?')>-1?'&':'?')+'callback='+cb;document.body.appendChild(s);
  setTimeout(function(){if(!done){cleanup();rej(new Error('หมดเวลาเชื่อมต่อเซิร์ฟเวอร์'));}},20000);
});}
function inGAS(){return (typeof google!=='undefined'&&google.script&&google.script.run);}
function gs(fn){var args=Array.prototype.slice.call(arguments,1);
  if(inGAS()){
    return new Promise(function(res,rej){
      google.script.run.withSuccessHandler(res).withFailureHandler(function(e){rej(new Error(e&&e.message||e));})[fn].apply(null,args);
    });
  }
  if(BACKEND_URL){
    return jsonp(BACKEND_URL+'?action='+encodeURIComponent(fn)+'&args='+encodeURIComponent(JSON.stringify(args)))
      .then(function(r){if(r&&r.error)throw new Error(r.error);return r?r.result:null;});
  }
  return new Promise(function(res,rej){setTimeout(function(){try{if(typeof MOCK[fn]!=='function')throw new Error('ไม่มีฟังก์ชัน '+fn);res(MOCK[fn].apply(null,args));}catch(e){rej(e);}},120);});}
var ASSETS=null;
function loadAssets(){
  if(!inGAS())return;
  gs('getAssets').then(function(a){ASSETS=a||{};
    if(ASSETS.logo){['loginLogo','sideLogo','loadLogo'].forEach(function(id){var e=document.getElementById(id);if(e)e.src=ASSETS.logo;});}
    if(ASSETS.floor&&!S.floorPlan)S.floorPlan=ASSETS.floor;
  }).catch(function(){});
}
