<style>
/* ===================== THEME TOKENS ===================== */
:root, [data-theme="dark"]{
  --bg:#0a0f0b; --bg2:#0e1510; --panel:#121b15; --panel2:#16201a;
  --card:#141d17; --card-h:#19251d; --border:#23332a; --border-soft:#1c2a22;
  --text:#e9f1ec; --muted:#8ba596; --muted2:#5f7869;
  --green:#34d27b; --green-d:#1e7e4f; --blue:#4aa3ff; --red:#ff5d5d;
  --amber:#ffb13c; --purple:#a98bff;
  --sidebar:#0c130e; --shadow:0 10px 30px rgba(0,0,0,.45);
  --grad: radial-gradient(1200px 600px at 80% -10%, rgba(52,210,123,.10), transparent 60%);
}
[data-theme="light"]{
  --bg:#eef6f0; --bg2:#f6faf6; --panel:#ffffff; --panel2:#f4faf5;
  --card:#ffffff; --card-h:#f3faf4; --border:#dfeae1; --border-soft:#e8f1ea;
  --text:#1d2a22; --muted:#5d7567; --muted2:#90a698;
  --green:#1fae63; --green-d:#1e7e4f; --blue:#2f7fe0; --red:#e0483f;
  --amber:#e7951c; --purple:#7a5be0;
  --sidebar:#ffffff; --shadow:0 8px 24px rgba(30,80,50,.10);
  --grad: radial-gradient(1100px 540px at 85% -10%, rgba(31,174,99,.14), transparent 60%),
          linear-gradient(180deg,#eafaf0,#f3f9f4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Prompt','Sarabun',system-ui,sans-serif;background:var(--bg);
  background-image:var(--grad);background-attachment:fixed;color:var(--text);min-height:100vh;}
button,input,select,textarea{font-family:inherit;color:inherit}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}

/* ===================== BRAND EMBLEM (legacy) ===================== */
.brand-emblem{display:inline-flex;gap:3px}
.brand-emblem .sq{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:12px;color:#fff}
.sq-g{background:var(--green-d)} .sq-r{background:#d23b3b}
.brand-emblem.big .sq{width:30px;height:30px;font-size:16px;border-radius:7px}

/* ===================== LOGIN ===================== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--border);
  border-radius:18px;padding:34px 28px;box-shadow:var(--shadow);text-align:center}
.login-title{font-size:22px;font-weight:700;letter-spacing:1px}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:22px}
.fld-label{display:block;text-align:left;font-size:12px;color:var(--muted);margin-bottom:6px}
.input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:15px;outline:none;transition:.15s}
.input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(52,210,123,.15)}
.btn{border:none;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--green);color:#06210f}
.btn-primary:hover{filter:brightness(1.07)}
.btn-block{width:100%;margin-top:16px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--card-h)}
.btn-danger{background:var(--red);color:#fff}
.btn-amber{background:var(--amber);color:#3a2400}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
.login-err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}
.login-hint{color:var(--muted2);font-size:11px;margin-top:18px;line-height:1.6}
.theme-mini{margin-top:14px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer}

/* ===================== SHELL ===================== */
.shell{display:flex;min-height:100vh}
.sidebar{width:248px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-brand{display:flex;gap:10px;align-items:center;padding:18px 18px 14px;border-bottom:1px solid var(--border-soft)}
.side-brand .bt{font-weight:700;font-size:14px;letter-spacing:.5px}
.side-brand .bs{font-size:10px;color:var(--muted);letter-spacing:1px}
.nav{flex:1;padding:12px 10px;overflow:auto}
.nav-group{font-size:10px;color:var(--muted2);letter-spacing:1.2px;padding:14px 12px 6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;cursor:pointer;
  color:var(--muted);font-size:14px;font-weight:500;transition:.13s;margin-bottom:2px}
.nav-item:hover{background:var(--card-h);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(52,210,123,.18),rgba(52,210,123,.04));
  color:var(--green);border:1px solid rgba(52,210,123,.25)}
.nav-item .ic{font-size:16px;width:20px;text-align:center}
.side-foot{padding:12px;border-top:1px solid var(--border-soft)}
.user-chip{display:flex;gap:10px;align-items:center;padding:8px;border-radius:10px;background:var(--card);margin-bottom:8px}
.avatar{width:36px;height:36px;border-radius:10px;background:var(--green-d);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700}
.user-meta .un{font-size:13px;font-weight:600} .user-meta .ur{font-size:11px;color:var(--muted);text-transform:capitalize}
.side-btn{width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:9px 10px;
  border-radius:8px;cursor:pointer;font-size:13px}
.side-btn:hover{background:var(--card-h);color:var(--text)}
.side-btn.danger:hover{color:var(--red)}

/* ===================== MAIN ===================== */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
  padding:20px 26px;border-bottom:1px solid var(--border-soft)}
.page-title{font-size:24px;font-weight:700}
.page-sub{color:var(--muted);font-size:13px;margin-top:2px}
.top-actions{display:flex;align-items:center;gap:14px}
.filter-pills{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bell{position:relative;background:var(--card);border:1px solid var(--border);width:42px;height:42px;
  border-radius:12px;font-size:18px;cursor:pointer}
.badge-dot{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;
  min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.content{padding:24px 26px;flex:1}

/* ===================== KPI CARDS ===================== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:26px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 18px 16px;
  position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--green)}
.kpi.b::before{background:var(--blue)} .kpi.r::before{background:var(--red)}
.kpi.a::before{background:var(--amber)} .kpi.p::before{background:var(--purple)}
.kpi .label{font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.kpi .num{font-size:38px;font-weight:700;line-height:1.1;margin-top:6px}
.kpi .num small{font-size:15px;color:var(--muted);font-weight:500}
.kpi .foot{font-size:12px;color:var(--muted);margin-top:8px}

.section-title{font-size:14px;color:var(--muted);margin:8px 0 14px;letter-spacing:.5px}

/* ===================== MACHINE CARDS ===================== */
.mc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;
  transition:.15s;position:relative}
.mc:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow)}
.mc .mc-top{display:flex;justify-content:space-between;align-items:flex-start}
.mc .mc-name{font-size:16px;font-weight:700}
.mc .mc-loc{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block}
.dot.ok{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.none{background:var(--muted2)} .dot.pend{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.dot.ng{background:var(--red);box-shadow:0 0 8px var(--red)}
.mc .mc-status{font-size:12.5px;margin-top:14px;font-weight:600}
.mc .pbar{height:5px;background:var(--border);border-radius:4px;margin-top:12px;overflow:hidden}
.mc .pbar > i{display:block;height:100%;background:var(--green);border-radius:4px}
.mc .mc-hour,.mc .mc-pm{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 10px;border-radius:10px;background:var(--bg2);border:1px solid var(--border-soft)}
.mc .mc-hour .mh-ic,.mc .mc-pm .mh-ic{font-size:15px}
.mc .mc-hour .mh-label,.mc .mc-pm .mh-label{font-size:11px;color:var(--muted);flex:1}
.mc .mc-hour .mh-val{font-size:15px;font-weight:700;color:var(--green)}
.mc .mc-pm .mh-val{font-size:14px;font-weight:700;color:var(--green)}
.mc .mc-pm.warn{border-color:var(--amber)} .mc .mc-pm.warn .mh-val{color:var(--amber)}
.mc .mc-pm.due{border-color:var(--red);background:rgba(255,93,93,.08)} .mc .mc-pm.due .mh-val{color:var(--red)}
.login-id-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px}
.login-id-box .lid-role{display:inline-block;margin-left:8px;font-size:11px;padding:2px 8px;border-radius:8px;background:rgba(52,210,123,.16);color:var(--green);text-transform:capitalize}

/* ===================== TABLE ===================== */
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.panel-head{padding:16px 18px;border-bottom:1px solid var(--border-soft);display:flex;
  justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.panel-head h3{font-size:15px}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;color:var(--muted);font-weight:600;padding:11px 14px;
  border-bottom:1px solid var(--border-soft);font-size:11.5px;letter-spacing:.5px;text-transform:uppercase}
table.tbl td{padding:11px 14px;border-bottom:1px solid var(--border-soft)}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tr:hover td{background:var(--card-h)}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.chip.ok{background:rgba(52,210,123,.16);color:var(--green)}
.chip.ng{background:rgba(255,93,93,.16);color:var(--red)}
.chip.sub{background:rgba(255,177,60,.16);color:var(--amber)}
.chip.appr{background:rgba(74,163,255,.16);color:var(--blue)}
.chip.rej{background:rgba(255,93,93,.16);color:var(--red)}
.chip.draft{background:var(--card-h);color:var(--muted)}

/* ===================== FORMS / FILTER ===================== */
.select,.date-input{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:8px 12px;font-size:13px;cursor:pointer}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.seg button{background:none;border:none;padding:8px 14px;font-size:13px;cursor:pointer;color:var(--muted)}
.seg button.on{background:var(--green);color:#06210f;font-weight:600}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:6px}
textarea.input{resize:vertical;min-height:70px}
.row-actions{display:flex;gap:10px;flex-wrap:wrap}

/* Check item rows */
.check-item{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--border);
  border-radius:12px;margin-bottom:10px;background:var(--card)}
.check-item .ci-label{flex:1;font-size:14px;font-weight:500}
.check-item .ci-ctrl{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.check-item .ci-num{display:flex;align-items:center;gap:6px}
.seg.choice button.on{background:var(--green);color:#06210f;font-weight:600}
.seg.choice button.on.bad{background:var(--red);color:#fff}
.check-item input[type=number]{width:120px}
.tog{position:relative;width:52px;height:28px;background:var(--border);border-radius:20px;cursor:pointer;transition:.15s;flex-shrink:0}
.tog i{position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.18s}
.tog.on{background:var(--green)} .tog.on i{left:27px}
.range-hint{font-size:11px;color:var(--muted2);margin-left:6px}
.res-pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:8px;min-width:34px;text-align:center}
.res-pill.pass{background:rgba(52,210,123,.16);color:var(--green)}
.res-pill.fail{background:rgba(255,93,93,.16);color:var(--red)}
.res-pill.na{background:var(--card-h);color:var(--muted)}

/* Signature pad */
.sig-wrap{border:1px dashed var(--border);border-radius:12px;background:var(--bg2);padding:8px}
canvas.sigpad{width:100%;height:150px;border-radius:8px;background:var(--panel);touch-action:none;display:block}

/* ===================== NOTIF DRAWER ===================== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40}
.drawer{position:fixed;top:0;right:0;width:360px;max-width:90vw;height:100vh;background:var(--panel);
  border-left:1px solid var(--border);z-index:50;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.drawer-head{padding:16px 18px;border-bottom:1px solid var(--border-soft);display:flex;
  justify-content:space-between;align-items:center;font-weight:600}
.mini-link{background:none;border:none;color:var(--green);cursor:pointer;font-size:12.5px;margin-left:10px}
.notif-list{flex:1;overflow:auto;padding:10px}
.notif{padding:12px 14px;border:1px solid var(--border-soft);border-radius:12px;margin-bottom:8px;cursor:pointer}
.notif.unread{border-left:3px solid var(--green);background:var(--card-h)}
.notif .nt{font-size:13px}.notif .nm{font-size:11px;color:var(--muted);margin-top:4px}
.notif .ntype{font-size:10px;padding:1px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.ntype.alert{background:rgba(255,93,93,.16);color:var(--red)}
.ntype.review{background:rgba(255,177,60,.16);color:var(--amber)}
.ntype.approved{background:rgba(74,163,255,.16);color:var(--blue)}
.ntype.rejected{background:rgba(255,93,93,.16);color:var(--red)}

/* ===================== MODAL ===================== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;display:flex;
  align-items:center;justify-content:center;padding:18px}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:18px;width:100%;max-width:640px;
  max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border-soft);display:flex;
  justify-content:space-between;align-items:center}
.modal-head h3{font-size:17px}
.modal-body{padding:22px}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border-soft);display:flex;justify-content:flex-end;gap:10px}
.x-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}

/* ===================== MISC ===================== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);
  background:var(--panel);border:1px solid var(--border);padding:13px 22px;border-radius:12px;
  box-shadow:var(--shadow);z-index:80;transition:.25s;font-size:14px;font-weight:500}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--green)} .toast.err{border-color:var(--red)}
.empty{text-align:center;color:var(--muted);padding:50px 20px}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--green);
  border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.muted{color:var(--muted)} .right{text-align:right} .center{text-align:center}
.flex{display:flex;gap:10px;align-items:center} .gap{gap:10px} .wrap{flex-wrap:wrap}
.mt{margin-top:14px}.mb{margin-bottom:14px}
.tag-add{background:none;border:1px dashed var(--green);color:var(--green);border-radius:8px;
  padding:7px 12px;cursor:pointer;font-size:13px}

/* responsive */
@media(max-width:860px){
  .sidebar{position:fixed;left:-260px;z-index:70;transition:.2s}
  .sidebar.open{left:0}
  .form-grid,.grid-2{grid-template-columns:1fr}
  .topbar{flex-direction:column}
}
</style>
