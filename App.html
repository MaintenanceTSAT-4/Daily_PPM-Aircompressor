<script>
/* ============================================================
 * Daily PPM Air Compressor — Client SPA
 * ============================================================ */
'use strict';

/* ---------- google.script.run -> Promise ---------- */
function gs(fn){
  var args = Array.prototype.slice.call(arguments,1);
  return new Promise(function(res,rej){
    google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn].apply(null,args);
  });
}

/* ---------- App state ---------- */
var S = {
  user:null, machines:[], items:[],
  date: todayStr(), shift:'all',
  notifs:[], view:'dashboard'
};

function todayStr(){
  var d=new Date(), p=function(n){return (n<10?'0':'')+n;};
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
}
function $(s,el){return (el||document).querySelector(s);}
function $all(s,el){return Array.prototype.slice.call((el||document).querySelectorAll(s));}
function el(html){var t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---------- Theme ---------- */
function applyTheme(t){document.documentElement.setAttribute('data-theme',t); S.theme=t;}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
$('#loginThemeBtn').onclick=toggleTheme;

/* ---------- Toast ---------- */
var toastT;
function toast(msg,type){
  var t=$('#toast'); t.textContent=msg; t.className='toast show '+(type||'');
  clearTimeout(toastT); toastT=setTimeout(function(){t.className='toast '+(type||'');},2600);
}

/* ============================================================
 * LOGIN
 * ============================================================ */
function doLogin(){
  var id=$('#empInput').value.trim();
  var err=$('#loginErr'); err.textContent='';
  if(!id){err.textContent='กรุณากรอกรหัสพนักงาน';return;}
  var btn=$('#loginBtn'); btn.disabled=true; btn.textContent='กำลังเข้าสู่ระบบ...';
  gs('apiLogin',id).then(function(r){
    btn.disabled=false; btn.textContent='เข้าสู่ระบบ';
    if(!r.ok){err.textContent=r.error;return;}
    S.user=r.user;
    return gs('apiBootstrap',id).then(function(b){
      S.machines=b.machines; S.items=b.items; S.notifs=b.notifications; S.date=b.today;
      startApp();
    });
  }).catch(function(e){btn.disabled=false;btn.textContent='เข้าสู่ระบบ';err.textContent='เกิดข้อผิดพลาด: '+e.message;});
}
$('#loginBtn').onclick=doLogin;
$('#empInput').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

/* ============================================================
 * NAV / ROUTER
 * ============================================================ */
var NAV = {
  dashboard:{label:'Dashboard',ic:'📊',roles:['operator','engineer','admin','viewer'],group:'ภาพรวม'},
  dailycheck:{label:'Daily Check',ic:'📝',roles:['operator','admin'],group:'การผลิต'},
  approvals:{label:'อนุมัติงาน',ic:'✅',roles:['engineer','admin'],group:'การผลิต'},
  records:{label:'ประวัติการตรวจ',ic:'📁',roles:['operator','engineer','admin','viewer'],group:'การผลิต'},
  admin:{label:'Admin · ตั้งค่า',ic:'⚙️',roles:['admin'],group:'ระบบ'},
  audit:{label:'Audit Log',ic:'🔎',roles:['engineer','admin'],group:'ระบบ'}
};

function buildNav(){
  var nav=$('#navMenu'); nav.innerHTML='';
  var groups={};
  Object.keys(NAV).forEach(function(k){
    if(NAV[k].roles.indexOf(S.user.role)===-1)return;
    var g=NAV[k].group; (groups[g]=groups[g]||[]).push(k);
  });
  Object.keys(groups).forEach(function(g){
    nav.appendChild(el('<div class="nav-group">'+g+'</div>'));
    groups[g].forEach(function(k){
      var item=el('<div class="nav-item" data-view="'+k+'"><span class="ic">'+NAV[k].ic+'</span>'+NAV[k].label+'</div>');
      item.onclick=function(){go(k);};
      nav.appendChild(item);
    });
  });
}

function go(view){
  S.view=view;
  $all('.nav-item').forEach(function(n){n.classList.toggle('active',n.dataset.view===view);});
  if(window.innerWidth<=860) $('.sidebar').classList.remove('open');
  var R={dashboard:viewDashboard,dailycheck:viewDailyCheck,approvals:viewApprovals,
         records:viewRecords,admin:viewAdmin,audit:viewAudit};
  (R[view]||viewDashboard)();
}

function startApp(){
  $('#loginView').style.display='none';
  $('#appShell').style.display='flex';
  $('#userName').textContent=S.user.name;
  $('#userRole').textContent=S.user.role;
  $('#userAvatar').textContent=(S.user.name||'U').charAt(0).toUpperCase();
  buildNav();
  renderNotifBadge();
  go('dashboard');
}

/* ---------- top filters (date + shift) ---------- */
function topFilterBar(onChange){
  var bar=$('#topFilters'); bar.innerHTML='';
  var date=el('<input type="date" class="date-input" value="'+S.date+'">');
  date.onchange=function(){S.date=date.value;onChange&&onChange();};
  bar.appendChild(date);
}
function clearTopFilters(){$('#topFilters').innerHTML='';}

function setPage(title,sub){$('#pageTitle').textContent=title;$('#pageSub').textContent=sub||'';}
function loading(){$('#content').innerHTML='<div class="spinner"></div>';}

/* ============================================================
 * DASHBOARD
 * ============================================================ */
function viewDashboard(){
  setPage('Machine Overview','Daily PPM · Air Compressor');
  topFilterBar(viewDashboard);
  loading();
  Promise.all([
    gs('apiDashboard',S.user.employeeId,S.date,S.shift),
    gs('apiTodayStatus',S.user.employeeId,S.date,S.shift)
  ]).then(function(r){
    var d=r[0], st=r[1];
    var kpis=
      kpiCard('','เครื่องจักรทั้งหมด',d.totalMachines,'เครื่อง','ตรวจแล้ว '+d.checkedMachines+'/'+d.totalMachines)+
      kpiCard('b','ตรวจวันนี้',d.submitted,'รายการ','ความครบถ้วน '+d.completionPct+'%')+
      kpiCard('a','รออนุมัติ',d.pending,'รายการ','Pending review')+
      kpiCard('','อนุมัติแล้ว',d.approved,'รายการ','Approved')+
      kpiCard('r','พบผิดปกติ (NG)',d.ng,'รายการ',d.ng>0?'⚠ ต้องตรวจสอบ':'ปกติทั้งหมด')+
      kpiCard('p','PM ใหญ่ถึงกำหนด',d.pmDue,'เครื่อง',d.pmDue>0?'⚠ ต้องวางแผนซ่อม':'ยังไม่ถึงกำหนด');
    var cards=st.map(machineCard).join('');
    $('#content').innerHTML=
      '<div class="kpi-grid">'+kpis+'</div>'+
      '<div class="section-title">สถานะเครื่องจักร · '+esc(S.date)+'</div>'+
      '<div class="mc-grid">'+(cards||'<div class="empty">ไม่มีเครื่องจักร</div>')+'</div>';
    $all('.mc').forEach(function(c){
      c.onclick=function(){
        var rid=c.dataset.rid;
        if(rid) openRecordModal(rid);
        else if(NAV.dailycheck.roles.indexOf(S.user.role)>-1){ go('dailycheck'); }
        else toast('ยังไม่มีการตรวจสำหรับเครื่องนี้');
      };
    });
  }).catch(showErr);
}
function kpiCard(cls,label,num,unit,foot){
  return '<div class="kpi '+cls+'"><div class="label">'+esc(label)+'</div>'+
    '<div class="num">'+num+' <small>'+esc(unit)+'</small></div>'+
    '<div class="foot">'+esc(foot)+'</div></div>';
}
function pmBlock(m){
  if(!m.pmInterval||m.pmInterval<=0)
    return '<div class="mc-pm"><span class="mh-ic">🛠</span><span class="mh-label">PM ใหญ่</span><span class="mh-val" style="color:var(--muted)">ยังไม่ตั้งค่า</span></div>';
  if(m.pmRemaining==null)
    return '<div class="mc-pm"><span class="mh-ic">🛠</span><span class="mh-label">PM ใหญ่ทุก '+m.pmInterval+' ชม.</span><span class="mh-val" style="color:var(--muted)">รอข้อมูลชม.</span></div>';
  var rem=m.pmRemaining, warn=m.pmInterval*0.1, cls, label, val;
  if(rem<=0){cls='due';label='ถึงกำหนด PM ใหญ่';val='เกิน '+Math.abs(rem)+' ชม.';}
  else if(rem<=warn){cls='warn';label='ใกล้ครบ PM ใหญ่';val=rem+' ชม.';}
  else{cls='';label='PM ใหญ่รอบหน้าอีก';val=rem+' ชม.';}
  return '<div class="mc-pm '+cls+'"><span class="mh-ic">🛠</span><span class="mh-label">'+label+'</span><span class="mh-val">'+val+'</span></div>';
}
function machineCard(m){
  var dotClass='none',txt='ยังไม่ตรวจ';
  if(m.status==='Approved'){dotClass='ok';txt='✓ อนุมัติแล้ว';}
  else if(m.status==='Submitted'){dotClass=(m.overall==='NG')?'ng':'pend';txt='⏳ รออนุมัติ ('+m.overall+')';}
  else if(m.status==='Rejected'){dotClass='ng';txt='✗ ตีกลับ';}
  if(m.overall==='NG'&&m.status==='Approved'){dotClass='ng';}
  var pct=(m.status==='Approved')?100:(m.status==='Submitted'?60:0);
  var rh=(m.runHour!==''&&m.runHour!=null)?esc(m.runHour)+' hr':'-';
  return '<div class="mc" data-rid="'+esc(m.recordId)+'">'+
    '<div class="mc-top"><div><div class="mc-name">'+esc(m.machineName)+'</div>'+
      '<div class="mc-loc">'+esc(m.machineId)+(m.location?' · '+esc(m.location):'')+'</div></div>'+
      '<span class="dot '+dotClass+'"></span></div>'+
    '<div class="mc-status">'+txt+'</div>'+
    '<div class="mc-hour"><span class="mh-ic">⏱</span><span class="mh-label">ชั่วโมงการทำงาน</span><span class="mh-val">'+rh+'</span></div>'+
    pmBlock(m)+
    '<div class="pbar"><i style="width:'+pct+'%;background:'+(dotClass==='ng'?'var(--red)':dotClass==='pend'?'var(--amber)':'var(--green)')+'"></i></div>'+
    '</div>';
}

/* ============================================================
 * DAILY CHECK
 * ============================================================ */
function viewDailyCheck(){
  setPage('Daily Check','บันทึกการตรวจประจำวัน');
  clearTopFilters();
  var machineOpts=S.machines.map(function(m){return '<option value="'+esc(m.id)+'">'+esc(m.name)+' ('+esc(m.id)+')</option>';}).join('');
  var html=
   '<div class="panel"><div class="panel-head"><h3>ฟอร์มตรวจเช็คเครื่องอัดอากาศ</h3></div>'+
   '<div class="modal-body">'+
     '<div class="form-grid">'+
       '<div class="field"><label>เครื่องจักร</label><select id="dcMachine" class="select" style="width:100%">'+machineOpts+'</select></div>'+
       '<div class="field"><label>วันที่</label><input id="dcDate" type="date" class="input" value="'+S.date+'"></div>'+
     '</div>'+
     '<div class="section-title mt">หัวข้อตรวจ ('+S.items.length+' รายการ)</div>'+
     '<div id="dcItems"></div>'+
     '<div class="field mt"><label>ผู้ตรวจ (อ้างอิงจากผู้เข้าสู่ระบบ)</label>'+
       '<div class="login-id-box">'+esc(S.user.name)+' · รหัส '+esc(S.user.employeeId)+'<span class="lid-role">'+esc(S.user.role)+'</span></div></div>'+
     '<div class="row-actions mt"><button class="btn btn-primary" id="dcSubmit">ส่งบันทึก & ขออนุมัติ</button>'+
       '<button class="btn btn-ghost" id="dcReset">ล้างฟอร์ม</button></div>'+
   '</div></div>';
  $('#content').innerHTML=html;

  renderCheckItems($('#dcItems'),null);
  $('#dcReset').onclick=viewDailyCheck;
  $('#dcSubmit').onclick=submitDailyCheck;
}

function renderCheckItems(host,existing){
  host.innerHTML='';
  var exMap={}; if(existing){existing.forEach(function(d){exMap[d.itemId]=d.value;});}
  S.items.forEach(function(it,idx){
    var val=exMap[it.id];
    var row=el('<div class="check-item" data-id="'+it.id+'"><div class="ci-label">'+(idx+1)+'. '+esc(it.label)+'</div></div>');
    var ctrl=el('<div class="ci-ctrl"></div>');
    if(it.type==='number'){
      var num=el('<input type="number" step="any" class="input" placeholder="ค่า" style="width:130px" value="'+(val!=null?esc(val):'')+'">');
      num.oninput=function(){updateRes(row,it);};
      ctrl.appendChild(num);
      if(it.unit) ctrl.appendChild(el('<span class="muted">'+esc(it.unit)+'</span>'));
      if(it.min!=null||it.max!=null) ctrl.appendChild(el('<span class="range-hint">เกณฑ์: '+(it.min!=null?it.min:'-')+' ~ '+(it.max!=null?it.max:'-')+'</span>'));
    }else if(it.type==='text'){
      var inp=el('<input class="input" style="width:220px" value="'+(val!=null?esc(val):'')+'">');
      inp.oninput=function(){updateRes(row,it);};
      ctrl.appendChild(inp);
    }else{
      // status (Normal/Abnormal) or yesno (Yes/No); legacy "boolean" => yesno
      var isStatus=(it.type==='status');
      var L=isStatus?['Normal','Abnormal']:['Yes','No'];
      if(isStatus && (it.min!=null||it.max!=null||it.unit))
        ctrl.appendChild(el('<span class="range-hint">เกณฑ์: '+(it.min!=null?it.min:'-')+' ~ '+(it.max!=null?it.max:'-')+(it.unit?' '+esc(it.unit):'')+'</span>'));
      var seg=el('<div class="seg choice"></div>');
      var bGood=el('<button data-v="1">'+L[0]+'</button>');
      var bBad=el('<button data-v="0">'+L[1]+'</button>');
      function pick(b,v){$all('button',seg).forEach(function(x){x.classList.remove('on','bad');});b.classList.add('on');if(v==='0')b.classList.add('bad');row.dataset.val=v;updateRes(row,it);}
      bGood.onclick=function(){pick(bGood,'1');}; bBad.onclick=function(){pick(bBad,'0');};
      seg.appendChild(bGood); seg.appendChild(bBad);
      ctrl.appendChild(seg);
      if(val===true||val==='true') pick(bGood,'1');
      else if(val===false||val==='false') pick(bBad,'0');
    }
    row.appendChild(ctrl);
    var pill=el('<span class="res-pill na">-</span>'); row.appendChild(pill);
    host.appendChild(row);
    updateRes(row,it);
  });
}
function readRowValue(row,it){
  if(it.type==='number'||it.type==='text'){var inp=$('input',row);return inp?inp.value:'';}
  // status / yesno / boolean -> tri-state boolean
  return row.dataset.val==='1'?true:(row.dataset.val==='0'?false:null);
}
function evalClient(it,value){
  if(it.type==='number'){
    if(value===''||value==null||isNaN(Number(value))) return 'na';
    var n=Number(value);
    if(it.min!=null&&n<it.min) return 'fail';
    if(it.max!=null&&n>it.max) return 'fail';
    return 'pass';
  }
  if(it.type==='text') return 'na';
  // status / yesno / boolean
  if(value===true||value==='true') return 'pass';
  if(value===false||value==='false') return 'fail';
  return 'na';
}
function updateRes(row,it){
  var r=evalClient(it,readRowValue(row,it));
  var pill=$('.res-pill',row);
  pill.className='res-pill '+r;
  pill.textContent=r==='pass'?'OK':r==='fail'?'NG':'-';
}

function collectValues(host){
  return S.items.map(function(it){
    var row=$('.check-item[data-id="'+it.id+'"]',host);
    return {itemId:it.id,label:it.label,value:readRowValue(row,it)};
  });
}

function submitDailyCheck(){
  var payload={
    machineId:$('#dcMachine').value,
    date:$('#dcDate').value,
    shift:'',
    values:collectValues($('#dcItems')),
    signature:''
  };
  var btn=$('#dcSubmit'); btn.disabled=true; btn.textContent='กำลังส่ง...';
  gs('apiSubmitCheck',S.user.employeeId,payload).then(function(r){
    btn.disabled=false; btn.textContent='ส่งบันทึก & ขออนุมัติ';
    toast('ส่งบันทึกเรียบร้อย · ผลรวม '+r.overall,r.overall==='NG'?'err':'ok');
    refreshNotifs(); go('dashboard');
  }).catch(function(e){btn.disabled=false;btn.textContent='ส่งบันทึก & ขออนุมัติ';showErr(e);});
}

/* ============================================================
 * SIGNATURE PAD
 * ============================================================ */
function initSigPad(canvas){
  var ctx=canvas.getContext('2d');
  var rect=canvas.getBoundingClientRect();
  canvas.width=canvas.offsetWidth; canvas.height=150;
  ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--text').trim()||'#fff';
  var drawing=false, has=false;
  function pos(e){var r=canvas.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return {x:t.clientX-r.left,y:t.clientY-r.top};}
  function start(e){drawing=true;var p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();}
  function move(e){if(!drawing)return;var p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();has=true;e.preventDefault();}
  function end(){drawing=false;}
  canvas.onmousedown=start;canvas.onmousemove=move;window.addEventListener('mouseup',end);
  canvas.ontouchstart=start;canvas.ontouchmove=move;canvas.ontouchend=end;
  canvas._has=function(){return has;};
  canvas._reset=function(){has=false;};
}
function clearSig(canvas){var c=canvas.getContext('2d');c.clearRect(0,0,canvas.width,canvas.height);canvas._reset();}
function getSig(canvas){return (canvas&&canvas._has&&canvas._has())?canvas.toDataURL('image/png'):'';}

/* ============================================================
 * RECORDS
 * ============================================================ */
function viewRecords(){
  setPage('ประวัติการตรวจ','Daily PPM Records');
  topFilterBar(viewRecords);
  loading();
  gs('apiListRecords',S.user.employeeId,{date:S.date,shift:S.shift}).then(function(rows){
    renderRecordTable(rows,'ไม่มีบันทึกในวันที่เลือก');
  }).catch(showErr);
}
function renderRecordTable(rows,emptyMsg){
  if(!rows.length){$('#content').innerHTML='<div class="panel"><div class="empty">'+emptyMsg+'</div></div>';return;}
  var body=rows.map(function(r){
    return '<tr data-rid="'+esc(r.recordId)+'" style="cursor:pointer">'+
      '<td>'+esc(r.date)+'</td>'+
      '<td>'+esc(r.machineName)+'</td><td>'+esc(r.operatorName)+'</td>'+
      '<td>'+resultChip(r.overall)+'</td><td>'+statusChip(r.status)+'</td>'+
      '<td class="muted">'+esc(r.engineerName||'-')+'</td></tr>';
  }).join('');
  $('#content').innerHTML=
    '<div class="panel"><div class="panel-head"><h3>รายการตรวจ ('+rows.length+')</h3></div>'+
    '<table class="tbl"><thead><tr><th>วันที่</th><th>เครื่องจักร</th><th>ผู้ตรวจ</th>'+
    '<th>ผล</th><th>สถานะ</th><th>ผู้อนุมัติ</th></tr></thead><tbody>'+body+'</tbody></table></div>';
  $all('tr[data-rid]').forEach(function(tr){tr.onclick=function(){openRecordModal(tr.dataset.rid);};});
}
function resultChip(o){return o==='NG'?'<span class="chip ng">NG</span>':o==='OK'?'<span class="chip ok">OK</span>':'<span class="chip draft">-</span>';}
function statusChip(s){
  var m={Approved:['appr','อนุมัติแล้ว'],Submitted:['sub','รออนุมัติ'],Rejected:['rej','ตีกลับ'],Draft:['draft','ร่าง']};
  var x=m[s]||['draft',s]; return '<span class="chip '+x[0]+'">'+x[1]+'</span>';
}

/* ============================================================
 * APPROVALS (engineer/admin)
 * ============================================================ */
function viewApprovals(){
  setPage('อนุมัติงาน','รายการรออนุมัติ / ตรวจสอบ');
  topFilterBar(viewApprovals);
  loading();
  gs('apiListRecords',S.user.employeeId,{date:S.date,shift:S.shift,status:'Submitted'}).then(function(rows){

/* ============================================================
 * RECORD DETAIL MODAL
 * ============================================================ */
function openRecordModal(recordId){
  if(!recordId)return;
  gs('apiGetRecord',S.user.employeeId,recordId).then(function(rec){
    if(!rec){toast('ไม่พบบันทึก','err');return;}
    var canReview=(S.user.role==='engineer'||S.user.role==='admin');
    var rows=rec.data.map(function(d,i){
      return '<tr><td>'+(i+1)+'</td><td>'+esc(d.label)+'</td><td>'+esc(valDisplay(d))+'</td><td>'+resPill(d.result)+'</td></tr>';
    }).join('');
    var opInfo='<div style="font-weight:600">'+esc(rec.operatorName)+'</div><div class="muted" style="font-size:12px">รหัส '+esc(rec.operatorId)+(rec.operatorRole?' · '+esc(rec.operatorRole):'')+'</div>';
    var sigEng=rec.engineerSig?'<img src="'+rec.engineerSig+'" style="height:54px">':'<span class="muted">รออนุมัติ</span>';
    var actions='';
    if(canReview && (rec.status==='Submitted'||rec.status==='Rejected')){
      actions=
        '<button class="btn btn-ghost btn-sm" id="rmEdit">✏️ แก้ไขค่า</button>'+
        '<button class="btn btn-danger btn-sm" id="rmReject">ตีกลับ</button>'+
        '<button class="btn btn-primary btn-sm" id="rmApprove">อนุมัติ + เซ็น</button>';
    }
    var pdfBtns='<button class="btn btn-ghost btn-sm" id="rmPdf">📄 PDF</button>'+
                '<button class="btn btn-ghost btn-sm" id="rmDrive">บันทึกลง Drive</button>';
    var body=
      '<div class="grid-2 mb"><div>'+

function valDisplay(d){
  if(d.type==='status') return (d.value===true||d.value==='true')?'Normal':(d.value===false||d.value==='false')?'Abnormal':'-';

/* ---------- PDF ---------- */
function exportPdf(recordId){
  toast('กำลังสร้าง PDF...');
  gs('apiExportPdf',S.user.employeeId,recordId).then(function(r){
    var bytes=atob(r.base64);var arr=new Uint8Array(bytes.length);
    for(var i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
    var blob=new Blob([arr],{type:'application/pdf'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=r.filename;document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1500);
    toast('ดาวน์โหลด PDF แล้ว','ok');
  }).catch(function(e){
    toast('ดาวน์โหลดไม่ได้ ลองปุ่ม "บันทึกลง Drive"','err');console.error(e);
  });
}
function savePdfDrive(recordId){
  toast('กำลังบันทึกลง Drive...');
  gs('apiSavePdfToDrive',S.user.employeeId,recordId).then(function(r){
    window.open(r.url,'_blank');toast('บันทึกลง Drive แล้ว','ok');
  }).catch(showErr);
}

function renderNotifBadge(){
  var n=S.notifs.filter(function(x){return !x.read;}).length;
  var b=$('#bellBadge'); if(n>0){b.style.display='flex';b.textContent=n;}else b.style.display='none';
}
function refreshNotifs(){
  gs('apiGetNotifications',S.user.employeeId).then(function(n){S.notifs=n;renderNotifBadge();if($('#notifDrawer').style.display!=='none')renderNotifList();});
}
function renderNotifList(){
  var list=$('#notifList');
  if(!S.notifs.length){list.innerHTML='<div class="empty">ไม่มีการแจ้งเตือน</div>';return;}
  list.innerHTML='';
  S.notifs.forEach(function(n){
    var d=el('<div class="notif '+(n.read?'':'unread')+'">'+
      '<div class="flex" style="justify-content:space-between"><span class="ntype '+esc(n.type)+'">'+esc(n.type)+'</span>'+
      '<span class="muted" style="font-size:11px">'+esc(n.createdAt)+'</span></div>'+
      '<div class="nt mt">'+esc(n.message)+'</div></div>');
    d.onclick=function(){
      if(n.recordId)openRecordModal(n.recordId);
      if(!n.read)gs('apiMarkNotifRead',S.user.employeeId,n.id).then(refreshNotifs);
      closeNotif();
    };
    list.appendChild(d);
  });
}
function openNotif(){$('#notifDrawer').style.display='flex';$('#overlay').style.display='block';renderNotifList();}
function closeNotif(){$('#notifDrawer').style.display='none';$('#overlay').style.display='none';}
$('#bellBtn').onclick=openNotif;
$('#closeNotif').onclick=closeNotif;
$('#overlay').onclick=closeNotif;
$('#markAllBtn').onclick=function(){gs('apiMarkAllRead',S.user.employeeId).then(refreshNotifs);};
$('#themeBtn').onclick=toggleTheme;
$('#logoutBtn').onclick=function(){S.user=null;$('#appShell').style.display='none';$('#loginView').style.display='flex';$('#empInput').value='';};

/* ============================================================
 * MODAL + HELPERS
 * ============================================================ */
function showModal(title,bodyHtml,footHtml){
  $('#modalHost').innerHTML=
    '<div class="modal-bg" id="modalBg"><div class="modal"><div class="modal-head"><h3>'+title+'</h3>'+
    '<button class="x-btn" id="modalX">✕</button></div><div class="modal-body">'+bodyHtml+'</div>'+
    '<div class="modal-foot">'+(footHtml||'')+'</div></div></div>';
  $('#modalX').onclick=closeModal;
  $('#modalBg').onclick=function(e){if(e.target.id==='modalBg')closeModal();};
}
function closeModal(){$('#modalHost').innerHTML='';}
function modalSaveFoot(){return '<button class="btn btn-ghost btn-sm" id="mCancel">ยกเลิก</button><button class="btn btn-primary btn-sm" id="mSave">บันทึก</button>';}
function panelWithAdd(title,addLabel,inner){
  return '<div class="panel"><div class="panel-head"><h3>'+title+'</h3>'+
    '<button class="btn btn-primary btn-sm" id="addBtn">+ '+addLabel+'</button></div>'+inner+'</div>';
}
function confirmAct(msg,cb){
  var foot='<button class="btn btn-ghost btn-sm" id="cCancel">ยกเลิก</button><button class="btn btn-danger btn-sm" id="cOk">ยืนยัน</button>';
  showModal('ยืนยัน','<p>'+esc(msg)+'</p>',foot);
  $('#cCancel').onclick=closeModal;$('#cOk').onclick=function(){closeModal();cb();};
}
function attr(o){return esc(JSON.stringify(o)).replace(/'/g,'&#39;');}
function bindSeg(sel){var s=$(sel);if(!s)return;s.addEventListener('click',function(e){if(e.target.tagName==='BUTTON'){$all('button',s).forEach(function(b){b.classList.remove('on');});e.target.classList.add('on');}});}
function segVal(sel,trueVal){var s=$(sel);if(!s)return true;var on=$('button.on',s);return on?on.dataset.v===trueVal:true;}
function showErr(e){console.error(e);$('#content')&&($('#content').innerHTML='<div class="empty">เกิดข้อผิดพลาด: '+esc(e&&e.message||e)+'</div>');toast('เกิดข้อผิดพลาด','err');}

/* periodic notif refresh */
setInterval(function(){if(S.user)refreshNotifs();},60000);
/* end of app */
</script>
